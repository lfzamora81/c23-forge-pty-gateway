services:
  - type: web
    name: c23-forge-pty-gateway
    runtime: node
    plan: standard
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # Secrets / account-specific values. Set these in Render.
      - key: E2B_API_KEY
        sync: false

      - key: TERMINAL_TOKEN_SECRET
        sync: false

      # Exact allowlist. Keep at least the production Base44 origin here.
      # Additional exact origins can be comma-separated in the Render dashboard.
      - key: ALLOWED_ORIGINS
        sync: false

      # Allows dynamic Base44 preview/sandbox subdomains such as:
      # https://preview--master-modern-c.base44.app
      # https://preview-sandbox--<id>.base44.app
      - key: ALLOWED_ORIGIN_SUFFIXES
        value: .base44.app

      # E2B template. "base" uses the default public/base sandbox.
      - key: DEFAULT_TEMPLATE_ID
        value: base

      # How long E2B should keep the sandbox running without user activity.
      # This remains configurable from Render without code changes.
      - key: TERMINAL_IDLE_TIMEOUT_MS
        value: 3600000

      # Backward-compatible alias used by older gateway code paths.
      - key: SANDBOX_TIMEOUT_MS
        value: 3600000

      # Gateway-side create/connect/PTY operation timeout.
      - key: START_TIMEOUT_MS
        value: 90000

      # Node WebSocket protocol-level heartbeat.
      - key: PROTOCOL_HEARTBEAT_MS
        value: 30000

      # Only prunes detached session metadata from Render process memory.
      # Does not kill the E2B sandbox.
      - key: DETACHED_RECORD_TTL_MS
        value: 21600000

      # Legacy value kept for compatibility with older docs/code.
      # The gateway no longer kills sandboxes merely because the browser navigates away.
      - key: SESSION_GRACE_MS
        value: 300000

      # Legacy value kept for compatibility.
      # TERMINAL_IDLE_TIMEOUT_MS is canonical.
      - key: IDLE_TIMEOUT_MS
        value: 3600000
